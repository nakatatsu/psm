name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.9.2

      - name: Build
        run: go build ./...

      - name: Format check (gofumpt)
        run: test -z "$(gofumpt -l .)"

      # Covers: go vet, staticcheck, gosec, goimports, errcheck, ineffassign, unused
      # Config: .golangci.yml
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          install-only: true

      - name: Show enabled linters
        run: golangci-lint linters | grep '^Enabled' -A 20

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race ./...

      - name: Vulnerability check
        if: always()
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  check-source-branch:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          HEAD="${{ github.head_ref }}"
          if [[ "$HEAD" =~ ^release- || "$HEAD" =~ ^hotfix- ]]; then
            echo "OK: $HEAD is allowed to merge into main"
          else
            echo "REJECTED: $HEAD — main へは release-* か hotfix-* からのみマージ可能"
            exit 1
          fi
