name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.9.2

      - name: Build
        run: go build ./...

      - name: Format check (gofumpt)
        run: test -z "$(gofumpt -l .)"

      # Covers: go vet, staticcheck, gosec, goimports, errcheck, ineffassign, unused
      # Config: .golangci.yml
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

      - name: Test
        run: go test -race ./...

      - name: Vulnerability check
        if: always()
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
