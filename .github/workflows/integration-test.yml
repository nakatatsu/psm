name: Integration Test

on:
  push:
    branches:
      - develop
      - 'release-*'

permissions:
  id-token: write
  contents: read

env:
  GO_VERSION: "1.26.1"
  SOPS_VERSION: "3.12.1"
  AGE_VERSION: "1.2.1"

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build psm
        run: go build -o psm .

      - name: Install SOPS
        run: |
          curl -fsSL -o /usr/local/bin/sops \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x /usr/local/bin/sops

      - name: Install age
        run: |
          curl -fsSL -o /tmp/age.tar.gz \
            "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz"
          tar xzf /tmp/age.tar.gz -C /usr/local/bin --strip-components=1 age/age age/age-keygen
          chmod +x /usr/local/bin/age /usr/local/bin/age-keygen
          rm /tmp/age.tar.gz

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run integration tests
        env:
          CI: "true"
          PSM_BIN: ./psm
        run: bash tests/integration/test.sh

  build-e2e-binary:
    if: startsWith(github.ref, 'refs/heads/release-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build E2E binary
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          go build -ldflags "-X main.version=${SHORT_SHA}" -o "psm_${SHORT_SHA}_linux_amd64" .

      - name: Upload E2E binary
        uses: actions/upload-artifact@v4
        with:
          name: psm-e2e-${{ github.sha }}
          path: psm_*_linux_amd64
          retention-days: 30
