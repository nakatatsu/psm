version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      # macOS amd64 (Intel) is declining; skip for now
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w

archives:
  - format: tar.gz

checksum:
  name_template: 'checksums.txt'
