http_port 3128

# Source networks
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src 127.0.0.1

# Allowed domains (loaded from external file)
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# Port restrictions
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow traffic from local network to allowed domains only
http_access allow localnet allowed_domains
http_access allow CONNECT localnet allowed_domains

# Deny everything else
http_access deny all

# Logging
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr

# Disable caching (pure forward proxy)
cache deny all
